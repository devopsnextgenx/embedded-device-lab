# Blink Test Sketch - PlatformIO Configuration
# This sketch demonstrates basic GPIO control on ESP32
# Extends board-level configuration

[platformio]
src_dir = src
include_dir = include

[env:esp32-devkit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_speed = 921600
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.partitions = min_spiffs.csv
monitor_speed = 115200

; Sketch-specific build flags
build_flags =
    -DBOARD_ESP32_DEVKIT
    -DSKETCH_NAME='"blink-test"'
    -DLED_PIN=2
