# ESP32 DevKit Board Configuration
# This configuration extends the global platformio.ini and adds board-specific settings

[platformio]
# Board-specific source directory (if different from global)
src_dir = sketches/${SKETCH_NAME}/src
include_dir = sketches/${SKETCH_NAME}/include

[env:esp32-devkit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; ESP32-specific settings
upload_speed = 921600
upload_port = auto
monitor_speed = 115200
monitor_port = auto

; ESP32 processor and frequency
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L

; Board-specific build flags (PSRAM, partition scheme, etc.)
build_flags = 
    ${env.build_flags}
    -DBOARD_ESP32_DEVKIT
    -DESP32_PARTITION_SCHEME
    -mfix-esp32-psram-cache-issue

; Board-specific libraries (adds to global lib_deps)
lib_deps = 
    ${env.lib_deps}

; Flash partitioning for ESP32
board_build.partitions = min_spiffs.csv
