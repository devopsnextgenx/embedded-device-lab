# TB6612FNG Motor Control Sketch - PlatformIO Configuration
# This sketch controls two DC motors using a TB6612FNG driver on Arduino Nano
# Extends board-level configuration

[platformio]
src_dir = src
include_dir = include

[env:arduino-nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
board_build.f_cpu = 16000000L
monitor_speed = 9600

; Sketch-specific build flags
build_flags =
    -DBOARD_ARDUINO_NANO
    -Os
    -DSKETCH_NAME='"motor-control-TB6612FNG"'
    -DSKETCH_VERSION='"1.0.0"'
