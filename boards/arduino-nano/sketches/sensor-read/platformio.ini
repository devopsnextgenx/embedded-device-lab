# Sensor Read Sketch - PlatformIO Configuration
# This sketch demonstrates sensor reading on Arduino Nano
# Extends board-level configuration

[platformio]
src_dir = src
include_dir = include

[env:arduino-nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
board_build.f_cpu = 16000000L
monitor_speed = 9600

; Sketch-specific build flags
build_flags =
    -DBOARD_ARDUINO_NANO
    -Os
    -DSKETCH_NAME='"sensor-read"'
    -DSENSOR_PIN=A0
