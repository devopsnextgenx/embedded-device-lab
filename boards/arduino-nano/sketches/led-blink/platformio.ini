# LED Blink Test Sketch - PlatformIO Configuration
# This sketch demonstrates LED blinking on Arduino Nano (3s ON / 2s OFF)
# Extends board-level configuration

[platformio]
src_dir = src
include_dir = include

[env:arduino-nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
board_build.f_cpu = 16000000L
monitor_speed = 9600

; Sketch-specific build flags
build_flags =
    -I${PROJECT_DIR}/../../../../shared/include
    -DBOARD_ARDUINO_NANO
    -Os
    -DSKETCH_NAME='"led-blink"'
    -DSKETCH_VERSION='"1.0.0"'
    -DLED_ON_DURATION=3000
    -DLED_OFF_DURATION=2000
