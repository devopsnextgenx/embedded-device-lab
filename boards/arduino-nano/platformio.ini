# Arduino Nano Board Configuration
# This configuration extends the global platformio.ini and adds board-specific settings

[platformio]
# Board-specific source directory (if different from global)
src_dir = sketches/${SKETCH_NAME}/src
include_dir = sketches/${SKETCH_NAME}/include

[env:arduino-nano]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Arduino Nano settings
upload_speed = 57600
upload_port = auto
monitor_speed = 9600
monitor_port = auto

; AVR processor and frequency
board_build.f_cpu = 16000000L

; Board-specific build flags
build_flags = 
    ${env.build_flags}
    -DBOARD_ARDUINO_NANO
    -Os

; Board-specific libraries (adds to global lib_deps)
lib_deps = 
    ${env.lib_deps}
