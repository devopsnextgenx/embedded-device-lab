# Embedded Device Lab - Global PlatformIO Configuration
# This is the root configuration that serves as the foundation for all boards and sketches
# Individual boards and sketches EXTEND this configuration for their specific needs

[platformio]
default_envs = esp32_devkit, arduino_nano
src_dir = src
include_dir = include

; Global build flags for all environments
; These can be overridden at board/sketch level
[env]
build_flags = 
    -I${PROJECT_DIR}/../../shared/include
    -DEMBEDDED_LAB_VERSION=1.0.0
    
lib_extra_dirs = 
    ${PROJECT_DIR}/../../shared/src

; Common library dependencies shared across all sketches
lib_deps =
    # Uncomment as needed:
    # adafruit/DHT sensor library
    # adafruit/Adafruit_SSD1306
    # Wire
    # SPI

monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time
    log2file

; ============================================================================
; Board Environments - Extended by individual board platformio.ini files
; ============================================================================

[env:esp32_devkit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags = 
    ${env.build_flags}
    -DBOARD_ESP32

[env:arduino_nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
monitor_speed = 9600
build_flags = 
    ${env.build_flags}
    -DBOARD_ARDUINO_NANO
